version: "3.8"

services:
  web:
    build: ./web
    restart: unless-stopped
    ports:
      - "80:80"
    env_file:
      - ./web/.env
    depends_on:
      - backend

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env

  whatsapp-gateway:
    build: ./whatsapp-gateway
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./whatsapp-gateway/.env
    depends_on:
      - backend
